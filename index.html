<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>贪吃金刚</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: 'Arial', sans-serif;
}

body {
background: linear-gradient(135deg, #2d5a2d, #1a3a1a);
color: #fff;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 15px 10px;
overflow: hidden;
}

/* 开始界面 */
#startScreen {
text-align: center;
margin-top: 50px;
z-index: 10;
}
.king-icon {
font-size: 90px;
margin-bottom: 20px;
animation: bounce 1s infinite alternate;
}
@keyframes bounce {
from { transform: translateY(0); }
to { transform: translateY(-10px); }
}
.title {
font-size: 40px;
font-weight: bold;
color: #ffcc00;
text-shadow: 0 0 15px #ff9900;
margin-bottom: 8px;
}
.subtitle {
font-size: 16px;
color: #fff;
margin-bottom: 30px;
}
#startBtn {
background: linear-gradient(180deg, #ff9500, #ff5c00);
border: none;
border-radius: 12px;
color: #000;
font-size: 22px;
font-weight: bold;
padding: 16px 40px;
cursor: pointer;
box-shadow: 0 8px 20px rgba(255,120,0,0.4);
transition: all 0.2s;
}
#startBtn:hover {
transform: translateY(-3px);
box-shadow: 0 10px 25px rgba(255,120,0,0.6);
}

/* 游戏容器 */
#gameContainer {
display: none;
flex-direction: column;
align-items: center;
z-index: 5;
}
#score {
font-size: 24px;
font-weight: bold;
color: #ffcc00;
margin: 10px 0;
text-shadow: 0 0 8px #ff9900;
}
#game {
border: 4px solid #ff9500;
border-radius: 8px;
background: #6ab04c;
width: 400px;
height: 400px;
box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

/* 方向按键 - 零延迟优化 */
.controls {
margin-top: 25px;
display: flex;
flex-direction: column;
align-items: center;
gap: 10px;
}
.controls .row {
display: flex;
gap: 10px;
}
.ctrl-btn {
width: 70px;
height: 70px;
font-size: 28px;
border-radius: 12px;
border: none;
background: #ff9500;
color: #000;
font-weight: bold;
cursor: pointer;
/* 核心：去掉移动端300ms延迟 */
touch-action: none;
user-select: none;
box-shadow: 0 4px 10px rgba(0,0,0,0.3);
transition: all 0.1s;
}
.ctrl-btn:active {
transform: scale(0.95);
background: #ff5c00;
box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}

/* 游戏结束弹窗 */
#gameOverModal {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.8);
display: none;
flex-direction: column;
align-items: center;
justify-content: center;
z-index: 999;
}
.modal-content {
background: #2d5a2d;
padding: 30px;
border-radius: 16px;
border: 3px solid #ff9500;
text-align: center;
box-shadow: 0 0 30px rgba(255,150,0,0.3);
max-width: 350px;
width: 90%;
}
.modal-title {
font-size: 32px;
color: #ffcc00;
margin-bottom: 10px;
}
.final-score {
font-size: 26px;
color: #fff;
margin-bottom: 20px;
}
#restartBtn {
background: linear-gradient(180deg, #ff9500, #ff5c00);
border: none;
border-radius: 10px;
color: #000;
font-size: 20px;
font-weight: bold;
padding: 12px 30px;
cursor: pointer;
margin-bottom: 20px;
width: 100%;
}
.rank-title {
font-size: 18px;
color: #ffcc00;
margin-bottom: 10px;
}
.rank-list {
text-align: left;
color: #fff;
font-size: 16px;
line-height: 1.8;
}
</style>
</head>

<body>

<!-- 开始界面 -->
<div id="startScreen">
<div class="king-icon">🦍</div>
<div class="title">贪吃金刚</div>
<div class="subtitle">金刚抓老鼠，越吃越强壮！</div>
<button id="startBtn">开始游戏</button>
</div>

<!-- 游戏界面 -->
<div id="gameContainer">
<div id="score">得分：0</div>
<canvas id="game"></canvas>
<!-- 方向按键 -->
<div class="controls">
<div class="row">
<button class="ctrl-btn" id="up">↑</button>
</div>
<div class="row">
<button class="ctrl-btn" id="left">←</button>
<button class="ctrl-btn" id="down">↓</button>
<button class="ctrl-btn" id="right">→</button>
</div>
</div>
</div>

<!-- 游戏结束弹窗 -->
<div id="gameOverModal">
<div class="modal-content">
<div class="modal-title">游戏结束</div>
<div class="final-score">最终得分：<span id="finalScore">0</span></div>
<button id="restartBtn">重新开始</button>
<div class="rank-title">🏆 历史排行榜</div>
<div class="rank-list" id="rankList"></div>
</div>
</div>

<script>
// 核心元素
const startScreen = document.getElementById('startScreen');
const gameContainer = document.getElementById('gameContainer');
const startBtn = document.getElementById('startBtn');
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const gameOverModal = document.getElementById('gameOverModal');
const finalScoreEl = document.getElementById('finalScore');
const restartBtn = document.getElementById('restartBtn');
const rankListEl = document.getElementById('rankList');
const ctrlBtns = document.querySelectorAll('.ctrl-btn');

// 游戏配置
const grid = 20; // 格子大小
const gameWidth = 400; // 游戏逻辑宽度
const gameHeight = 400; // 游戏逻辑高度
const speed = 180; // 游戏速度（毫秒/帧，数值越小越快）
let snake = []; // 蛇身数组
let dx = grid; // x方向移动距离
let dy = 0; // y方向移动距离
let food = {}; // 食物坐标
let score = 0; // 当前得分
let lastTime = 0; // 上一帧时间
let gameRunning = false; // 游戏运行状态
let directionLock = false;
