<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>贪吃金刚</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: 'Arial', sans-serif;
}

body {
background: linear-gradient(135deg, #2d5a2d, #1a3a1a);
color: #fff;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 15px 10px;
overflow: hidden;
}

/* 开始界面 */
#startScreen {
text-align: center;
margin-top: 50px;
z-index: 10;
}
.king-icon {
font-size: 90px;
margin-bottom: 20px;
animation: bounce 1s infinite alternate;
}
@keyframes bounce {
from { transform: translateY(0); }
to { transform: translateY(-10px); }
}
.title {
font-size: 40px;
font-weight: bold;
color: #ffcc00;
text-shadow: 0 0 15px #ff9900;
margin-bottom: 8px;
}
.subtitle {
font-size: 16px;
color: #fff;
margin-bottom: 30px;
}
#startBtn {
background: linear-gradient(180deg, #ff9500, #ff5c00);
border: none;
border-radius: 12px;
color: #000;
font-size: 22px;
font-weight: bold;
padding: 16px 40px;
cursor: pointer;
box-shadow: 0 8px 20px rgba(255,120,0,0.4);
transition: all 0.2s;
}
#startBtn:hover {
transform: translateY(-3px);
box-shadow: 0 10px 25px rgba(255,120,0,0.6);
}

/* 游戏容器 */
#gameContainer {
display: none;
flex-direction: column;
align-items: center;
z-index: 5;
}
#score {
font-size: 24px;
font-weight: bold;
color: #ffcc00;
margin: 10px 0;
text-shadow: 0 0 8px #ff9900;
}
#game {
border: 4px solid #ff9500;
border-radius: 8px;
background: #6ab04c;
width: 400px;
height: 400px;
box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

/* 方向按键 - 零延迟优化 */
.controls {
margin-top: 25px;
display: flex;
flex-direction: column;
align-items: center;
gap: 10px;
}
.controls .row {
display: flex;
gap: 10px;
}
.ctrl-btn {
width: 70px;
height: 70px;
font-size: 28px;
border-radius: 12px;
border: none;
background: #ff9500;
color: #000;
font-weight: bold;
cursor: pointer;
/* 核心：去掉移动端300ms延迟 */
touch-action: none;
user-select: none;
box-shadow: 0 4px 10px rgba(0,0,0,0.3);
transition: all 0.1s;
}
.ctrl-btn:active {
transform: scale(0.95);
background: #ff5c00;
box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}

/* 游戏结束弹窗 */
#gameOverModal {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.8);
display: none;
flex-direction: column;
align-items: center;
justify-content: center;
z-index: 999;
}
.modal-content {
background: #2d5a2d;
padding: 30px;
border-radius: 16px;
border: 3px solid #ff9500;
text-align: center;
box-shadow: 0 0 30px rgba(255,150,0,0.3);
max-width: 350px;
width: 90%;
}
.modal-title {
font-size: 32px;
color: #ffcc00;
margin-bottom: 10px;
}
.final-score {
font-size: 26px;
color: #fff;
margin-bottom: 20px;
}
#restartBtn {
background: linear-gradient(180deg, #ff9500, #ff5c00);
border: none;
border-radius: 10px;
color: #000;
font-size: 20px;
font-weight: bold;
padding: 12px 30px;
cursor: pointer;
margin-bottom: 20px;
width: 100%;
}
.rank-title {
font-size: 18px;
color: #ffcc00;
margin-bottom: 10px;
}
.rank-list {
text-align: left;
color: #fff;
font-size: 16px;
line-height: 1.8;
}
</style>
</head>

<body>

<!-- 开始界面 -->
<div id="startScreen">
<div class="king-icon">🦍</div>
<div class="title">贪吃金刚</div>
<div class="subtitle">金刚抓老鼠，越吃越强壮！</div>
<button id="startBtn">开始游戏</button>
</div>

<!-- 游戏界面 -->
<div id="gameContainer">
<div id="score">得分：0</div>
<canvas id="game"></canvas>
<!-- 方向按键 -->
<div class="controls">
<div class="row">
<button class="ctrl-btn" id="up">↑</button>
</div>
<div class="row">
<button class="ctrl-btn" id="left">←</button>
<button class="ctrl-btn" id="down">↓</button>
<button class="ctrl-btn" id="right">→</button>
</div>
</div>
</div>

<!-- 游戏结束弹窗 -->
<div id="gameOverModal">
<div class="modal-content">
<div class="modal-title">游戏结束</div>
<div class="final-score">最终得分：<span id="finalScore">0</span></div>
<button id="restartBtn">重新开始</button>
<div class="rank-title">🏆 历史排行榜</div>
<div class="rank-list" id="rankList"></div>
</div>
</div>

<script>
// 核心元素
const startScreen = document.getElementById('startScreen');
const gameContainer = document.getElementById('gameContainer');
const startBtn = document.getElementById('startBtn');
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const gameOverModal = document.getElementById('gameOverModal');
const finalScoreEl = document.getElementById('finalScore');
const restartBtn = document.getElementById('restartBtn');
const rankListEl = document.getElementById('rankList');
const ctrlBtns = document.querySelectorAll('.ctrl-btn');

// 游戏配置
const grid = 20; // 格子大小
const gameWidth = 400; // 游戏逻辑宽度
const gameHeight = 400; // 游戏逻辑高度
const speed = 180; // 游戏速度（毫秒/帧，数值越小越快）
let snake = []; // 蛇身数组
let dx = grid; // x方向移动距离
let dy = 0; // y方向移动距离
let food = {}; // 食物坐标
let score = 0; // 当前得分
let lastTime = 0; // 上一帧时间
let gameRunning = false; // 游戏运行状态
let directionLock = false; // 方向锁，防止一帧内多次转向

// 高清屏适配 - 解决图标模糊核心代码
const dpr = window.devicePixelRatio || 1;
canvas.width = gameWidth * dpr;
canvas.height = gameHeight * dpr;
canvas.style.width = gameWidth + 'px';
canvas.style.height = gameHeight + 'px';
ctx.scale(dpr, dpr);

// 初始化游戏
function initGame() {
    // 重置游戏状态
    snake = [{ x: 10 * grid, y: 10 * grid }];
    dx = grid;
    dy = 0;
    score = 0;
    scoreEl.innerText = '得分：' + score;
    gameRunning = true;
    directionLock = false;
    
    // 生成食物
    createFood();
    
    // 启动游戏循环（requestAnimationFrame 比 setInterval 延迟更低）
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
}

// 生成食物
function createFood() {
    food = {
        x: Math.floor(Math.random() * (gameWidth / grid)) * grid,
        y: Math.floor(Math.random() * (gameHeight / grid)) * grid
    };
    // 防止食物生成在蛇身上
    snake.forEach(part => {
        if (part.x === food.x && part.y === food.y) createFood();
    });
}

// 游戏主循环
function gameLoop(currentTime) {
    if (!gameRunning) return;

    // 控制帧率
    const deltaTime = currentTime - lastTime;
    if (deltaTime >= speed) {
        lastTime = currentTime;
        directionLock = false; // 每帧解锁方向
        updateGame();
        renderGame();
    }

    requestAnimationFrame(gameLoop);
}

// 更新游戏逻辑
function updateGame() {
    // 计算新蛇头
    const head = { x: snake[0].x + dx, y: snake[0].y + dy };

    // 撞墙检测
    if (head.x < 0 || head.x >= gameWidth || head.y < 0 || head.y >= gameHeight) {
        gameOver();
        return;
    }

    // 撞自己检测
    snake.forEach(part => {
        if (head.x === part.x && head.y === part.y) {
            gameOver();
            return;
        }
    });

    // 蛇头前进
    snake.unshift(head);

    // 吃食物检测
    if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.innerText = '得分：' + score;
        createFood();
    } else {
        // 没吃食物就去掉蛇尾
        snake.pop();
    }
}

// 渲染游戏画面
function renderGame() {
    // 绘制草地背景（加格子纹理更真实）
    ctx.fillStyle = '#6ab04c';
    ctx.fillRect(0, 0, gameWidth, gameHeight);
    
    // 草地格子纹理
    ctx.strokeStyle = '#5a9f40';
    ctx.lineWidth = 1;
    for (let i = 0; i <= gameWidth; i += grid) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, gameHeight);
        ctx.stroke();
    }
    for (let i = 0; i <= gameHeight; i += grid) {
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(gameWidth, i);
        ctx.stroke();
    }

    // 绘制食物 🧀 高清居中绘制
    ctx.font = `${grid}px Arial, "Apple Color Emoji", "Segoe UI Emoji"`;
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'center';
    ctx.fillText('🧀', food.x + grid/2, food.y + grid/2);

    // 绘制蛇身体 🐭
    snake.forEach((part, index) => {
        if (index !== 0) {
            ctx.fillText('🐭', part.x + grid/2, part.y + grid/2);
        }
    });

    // 绘制蛇头 🦍
    ctx.fillText('🦍', snake[0].x + grid/2, snake[0].y + grid/2);
}

// 游戏结束
function gameOver() {
    gameRunning = false;
    finalScoreEl.innerText = score;
    
    // 保存得分到排行榜
    saveRank(score);
    
    // 更新排行榜显示
    updateRankList();
    
    // 显示结束弹窗
    gameOverModal.style.display = 'flex';
}

// 排行榜相关 - 本地永久存储
function saveRank(score) {
    let ranks = JSON.parse(localStorage.getItem('snakeKingRank')) || [];
    ranks.push(score);
    // 排序取前5
    ranks = ranks.sort((a, b) => b - a).slice(0, 5);
    localStorage.setItem('snakeKingRank', JSON.stringify(ranks));
}

function updateRankList() {
    const ranks = JSON.parse(localStorage.getItem('snakeKingRank')) || [];
    let html = '';
    ranks.forEach((score, index) => {
        html += `<div>第${index+1}名：${score}分</div>`;
    });
    if (ranks.length === 0) {
        html = '<div>暂无记录，快来刷新榜单！</div>';
    }
    rankListEl.innerHTML = html;
}

// 方向控制函数 - 零延迟核心
function changeDirection(newDx, newDy) {
    // 防止反向移动 + 方向锁
    if (directionLock || newDx === -dx || newDy === -dy) return;
    dx = newDx;
    dy = newDy;
    directionLock = true; // 锁定方向，一帧内只能改一次
}

// 键盘控制
document.addEventListener('keydown', (e) => {
    e.preventDefault(); // 防止按键滚动页面
    switch(e.key) {
        case 'ArrowLeft':
        case 'a':
            changeDirection(-grid, 0);
            break;
        case 'ArrowUp':
        case 'w':
            changeDirection(0, -grid);
            break;
        case 'ArrowRight':
        case 'd':
            changeDirection(grid, 0);
            break;
        case 'ArrowDown':
        case 's':
            changeDirection(0, grid);
            break;
    }
});

// 屏幕按键控制 - 零延迟优化（同时支持鼠标和触摸）
document.getElementById('up').addEventListener('mousedown', (e) => {
    e.preventDefault();
    changeDirection(0, -grid);
});
document.getElementById('down').addEventListener('mousedown', (e) => {
    e.preventDefault();
    changeDirection(0, grid);
});
document.getElementById('left').addEventListener('mousedown', (e) => {
    e.preventDefault();
    changeDirection(-grid, 0);
});
document.getElementById('right').addEventListener('mousedown', (e) => {
    e.preventDefault();
    changeDirection(grid, 0);
});

// 移动端触摸事件 - 彻底解决延迟
document.getElementById('up').addEventListener('touchstart', (e) => {
    e.preventDefault();
    changeDirection(0, -grid);
});
document.getElementById('down').addEventListener('touchstart', (e) => {
    e.preventDefault();
    changeDirection(0, grid);
});
document.getElementById('left').addEventListener('touchstart', (e) => {
    e.preventDefault();
    changeDirection(-grid, 0);
});
document.getElementById('right').addEventListener('touchstart', (e) => {
    e.preventDefault();
    changeDirection(grid, 0);
});

// 按钮点击事件
startBtn.onclick = () => {
    startScreen.style.display = 'none';
    gameContainer.style.display = 'flex';
    initGame();
};

restartBtn.onclick = () => {
    gameOverModal.style.display = 'none';
    initGame();
};
</script>
</body>
</html>
